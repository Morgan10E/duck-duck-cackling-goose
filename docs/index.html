<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duck Duck Cackling Goose</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Duck Duck Cackling Goose</h1>
        <button
          type="button"
          class="icon-btn stats-trigger"
          aria-label="Open statistics"
          title="Statistics"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 19h16v2H4v-2zm2-4h2v4H6v-4zm4-6h2v10h-2V9zm4 4h2v6h-2v-6zm4-8h2v14h-2V5z"
              fill="currentColor"
            />
          </svg>
        </button>
      </header>

      <main class="main">
        <div class="photo-area">
          <div class="image-wrap">
            <div class="image-placeholder" id="imagePlaceholder">
              <span class="spinner" aria-hidden="true"></span>
              <span class="placeholder-text">Loading goose…</span>
            </div>
            <img
              id="gooseImage"
              class="goose-image hidden"
              alt=""
              decoding="async"
              referrerpolicy="no-referrer"
            />
            <div id="feedback" class="feedback hidden" aria-live="polite"></div>
          </div>
          <p class="credit" id="photoCredit"></p>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-cackling" id="btnCackling" disabled>
            Cackling Goose
          </button>
          <button type="button" class="btn btn-canada" id="btnCanada" disabled>
            Canada Goose
          </button>
        </div>

        <p class="error hidden" id="errorMsg" role="alert"></p>
      </main>
    </div>

    <dialog class="modal" id="statsModal" aria-labelledby="statsTitle">
      <div class="modal-inner">
        <div class="modal-header">
          <h2 id="statsTitle" class="modal-title">Statistics</h2>
          <button type="button" class="icon-btn modal-close" id="statsClose" aria-label="Close">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
        <div class="stats-summary">
          <p class="stats-accuracy-label">Total accuracy</p>
          <p class="stats-accuracy-value" id="statTotalPct">—</p>
        </div>

        <dl class="stats-extra">
          <div class="stat-row">
            <dt>Current streak</dt>
            <dd id="statCurrentStreak">—</dd>
          </div>
          <div class="stat-row">
            <dt>Longest correct streak</dt>
            <dd id="statLongestStreak">—</dd>
          </div>
        </dl>

        <dl class="stats-extra">
          <table class="stats-matrix" aria-describedby="statsMatrixDesc">
            <thead>
              <tr>
                <th class="stats-matrix-corner stats-matrix-label-cell" scope="col"></th>
                <th class="stats-matrix-corner stats-matrix-label-cell" scope="col"></th>
                <th class="stats-matrix-you-guessed" scope="colgroup" colspan="2">
                  You guessed…
                </th>
              </tr>
              <tr>
                <th class="stats-matrix-corner stats-matrix-label-cell" scope="row"></th>
                <th class="stats-matrix-corner stats-matrix-label-cell" scope="row"></th>
                <th scope="row">Canada goose</th>
                <th scope="row">Cackling goose</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th class="stats-matrix-when stats-matrix-label-cell" scope="rowgroup" rowspan="2">
                  <div class="stats-matrix-label-wrap">
                    <span class="stats-matrix-label-rotated">When it was…</span>
                  </div>
                </th>
                <th scope="row" class="stats-matrix-label-cell">
                  <div class="stats-matrix-label-wrap">
                    <span class="stats-matrix-label-rotated">Canada goose</span>
                  </div>
                </th>
                <td id="statWhenCanadaGuessCanada" class="stats-matrix-cell">0</td>
                <td id="statWhenCanadaGuessCackling" class="stats-matrix-cell">0</td>
              </tr>
              <tr>
                <th scope="row" class="stats-matrix-label-cell">
                  <div class="stats-matrix-label-wrap">
                    <span class="stats-matrix-label-rotated">Cackling goose</span>
                  </div>
                </th>
                <td id="statWhenCacklingGuessCanada" class="stats-matrix-cell">0</td>
                <td id="statWhenCacklingGuessCackling" class="stats-matrix-cell">0</td>
              </tr>
            </tbody>
          </table>
          <p id="statsMatrixDesc" class="stats-matrix-hint">
            Number of rounds for each combination of photo species and your guess.
          </p>
        </dl>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
